            --red-bg: rgba(239,68,68,0.1);

        body {

            background: var(--bg);
            color: var(--text);

            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid var(--border);
            padding: 2.5rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 60%);
            animation: pulse 4s ease-in-out infinite;

            display: inline-block;
            background: var(--red);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #93c5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.75rem;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1.05rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            padding: 1.25rem 1.5rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 1.75rem;
            font-weight: 800;
        }
        .stat-value.total { color: var(--accent); }
        .stat-value.wrong { color: var(--red); }
        .stat-value.incomplete { color: var(--orange); }
        .stat-value.calc-error { color: var(--purple); }
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 0.15rem;
        }

        /* Filter Tabs */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.45rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

            margin: 0 auto;
            padding: 1.5rem;

        .card-header {

            align-items: center;
            gap: 1rem;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;

            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;

            font-size: 0.85rem;
            color: var(--accent);

            font-weight: 600;
            padding: 0.2rem 0.55rem;
            border-radius: 6px;

        .tag-calculation_error { background: var(--purple-bg); color: var(--purple); }
        .tag-logic_error { background: var(--red-bg); color: var(--red); }

        .section {
            margin-bottom: 1.25rem;

        .section:last-child { margin-bottom: 0; }
        .section-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .question-full {

            border-radius: 0 8px 8px 0;

        .judge-explanation {
            background: var(--red-bg);
            border: 1px solid rgba(239,68,68,0.2);
            padding: 1rem 1.25rem;
            border-radius: 8px;
            font-size: 0.92rem;
            line-height: 1.8;
        }
        .meta-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .meta-item { display: flex; align-items: center; gap: 0.35rem; }
        .meta-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }

        /* Placeholder for future data */
        .placeholder-section {
            text-align: center;
            padding: 3rem 1.5rem;
        }
        .placeholder-icon {
            font-size: 3rem;
            opacity: 0.3;

        .placeholder-text {

            font-size: 0.95rem;
        }
        .placeholder-hint {
            font-size: 0.82rem;
            color: var(--text-muted);
            opacity: 0.6;
            margin-top: 0.5rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.82rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }
        .footer a { color: var(--accent); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 640px) {
            .title { font-size: 1.4rem; }
            .stats-bar { gap: 1rem; }
            .card-header { flex-wrap: wrap; }
            .card-question { white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
            .meta-row { flex-direction: column; gap: 0.4rem; }
        }
    </style>
</head>

// ========== 统计 ==========
function calcStats(data) {
    const total = data.length;
    const types = {};
    data.forEach(d => { types[d.error_type] = (types[d.error_type]||0)+1; });
    return { total, types };
}

// ========== 渲染 ==========
function renderStats() {
    const s = calcStats(errorData);
    document.getElementById('statsBar').innerHTML = `
        <div class="stat-item"><div class="stat-value total">${s.total}</div><div class="stat-label">总判错数</div></div>

}

function escapeHtml(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    // preserve some formatting
    return d.innerHTML.replace(/\n/g, '<br>');
}

function getErrorLabel(t) {

// ========== Filter ==========
document.getElementById('filterBar').addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderList(e.target.dataset.filter);
});

// ========== Init ==========
renderStats();
renderList('all');

// Show first card expanded
setTimeout(() => {
    const first = document.querySelector('.error-card');
    if (first) first.classList.add('expanded');
}, 300);

document.getElementById('updateTime').textContent = new Date().toLocaleDateString('zh-CN');
</script>
</body>
</html>
